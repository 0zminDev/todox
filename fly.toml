app = 'todox'
primary_region = 'waw'

[build]

[env]
  PORT = '8080'
  DB_PATH = '/data/todos.db'

[[mounts]]
  source = 'todox_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
