name: Deploy Production

# Runs once a day at ~03:00 Europe/Warsaw (GitHub Actions cron is UTC-only, so
# this is a fixed UTC time and will drift by an hour across DST — adjust the
# cron expression below if that matters). Only actually deploys if `master`
# has moved since the last successful production deploy, tracked via the
# `production-deployed` tag. Use "Run workflow" for an on-demand deploy that
# skips the change check.
on:
  schedule:
    - cron: '7 2 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manually triggered — deploying regardless of changes."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git rev-parse -q --verify refs/tags/production-deployed >/dev/null; then
            LAST=$(git rev-list -n 1 production-deployed)
            CURRENT=$(git rev-parse HEAD)
            if [ "$LAST" = "$CURRENT" ]; then
              echo "No changes on master since last production deploy ($LAST) — skipping."
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No production-deployed tag found yet — deploying."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  deploy:
    needs: [check, build]
    if: needs.check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    concurrency: deploy-production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Mark this commit as deployed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f production-deployed
          git push origin production-deployed --force
