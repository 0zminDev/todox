<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>TodoX</title>
	<link rel="stylesheet" href="/static/style.css">
	<script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
	{{template "navbar" .User}}

	<main class="container">
		<h1>Your todos</h1>

		<form id="add-form"
		      hx-post="/todos"
		      hx-target="#todo-list"
		      hx-swap="afterbegin"
		      hx-on::after-request="if(event.detail.successful) { this.reset(); this.querySelector('details').open = false }">
			<div class="add-form-main">
				<input type="text" name="text" placeholder="What needs to be done?" autocomplete="off" required>
				<button type="submit">Add</button>
			</div>
			<details class="add-form-advanced">
				<summary>More options</summary>
				<textarea name="description" placeholder="Description (optional)" rows="2"></textarea>
				<div class="edit-form-row">
					<input type="date" name="due_date">
					<input type="text" name="tag" placeholder="Tag (optional)">
				</div>
			</details>
		</form>

		<ul id="todo-list">
			{{range .Todos}}
				{{template "todo-item.html" .}}
			{{else}}
				{{template "empty-state.html"}}
			{{end}}
		</ul>
	</main>
</body>
</html>
