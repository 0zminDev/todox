<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Log in — TodoX</title>
	<link rel="stylesheet" href="/static/style.css">
</head>
<body>
	<main class="auth-container">
		<div class="auth-card">
			<a class="brand" href="/">TodoX</a>
			<h1>Log in</h1>

			{{if .Error}}<p class="error-message">{{.Error}}</p>{{end}}

			<form method="post" action="/login">
				<label>
					Email
					<input type="email" name="email" value="{{.Email}}" required autofocus>
				</label>
				<label>
					Password
					<input type="password" name="password" required>
				</label>
				<button type="submit" class="btn btn-primary btn-block">Log in</button>
			</form>

			<p class="auth-switch">Don't have an account? <a href="/register">Sign up</a></p>
		</div>
	</main>
</body>
</html>
