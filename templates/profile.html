<!DOCTYPE html>
<html lang="pl">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Profil — TodoX</title>
	<link rel="stylesheet" href="/static/style.css">
</head>
<body>
	{{template "navbar" .User}}

	<main class="auth-container">
		<div class="auth-card">
			<h1>Twój profil</h1>

			<div class="profile-field">
				<span class="muted">E-mail</span>
				<span>{{.User.Email}}</span>
			</div>

			{{if .Saved}}<p class="success-message">Zapisano zmiany.</p>{{end}}
			{{if .Error}}<p class="error-message">{{.Error}}</p>{{end}}

			<form method="post" action="/profile">
				<label>
					Imię
					<input type="text" name="name" value="{{.User.Name}}" required>
				</label>
				<button type="submit" class="btn btn-primary btn-block">Zapisz</button>
			</form>

			<hr>

			<h2>Zmień hasło</h2>
			{{if .PasswordSaved}}<p class="success-message">Hasło zostało zmienione.</p>{{end}}
			{{if .PasswordError}}<p class="error-message">{{.PasswordError}}</p>{{end}}

			<form method="post" action="/profile/password">
				<label>
					Aktualne hasło
					<input type="password" name="current_password" required>
				</label>
				<label>
					Nowe hasło
					<input type="password" name="new_password" required minlength="8">
				</label>
				<label>
					Powtórz nowe hasło
					<input type="password" name="new_password2" required minlength="8">
				</label>
				<button type="submit" class="btn btn-primary btn-block">Zmień hasło</button>
			</form>
		</div>
	</main>
</body>
</html>
