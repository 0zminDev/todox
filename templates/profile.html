<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Profile — TodoX</title>
	<link rel="stylesheet" href="/static/style.css">
</head>
<body>
	{{template "navbar" .User}}

	<main class="auth-container">
		<div class="auth-card">
			<h1>Your profile</h1>

			<div class="profile-field">
				<span class="muted">Email</span>
				<span>{{.User.Email}}</span>
			</div>

			{{if .Saved}}<p class="success-message">Changes saved.</p>{{end}}
			{{if .Error}}<p class="error-message">{{.Error}}</p>{{end}}

			<form method="post" action="/profile">
				<label>
					Name
					<input type="text" name="name" value="{{.User.Name}}" required>
				</label>
				<button type="submit" class="btn btn-primary btn-block">Save</button>
			</form>

			<hr>

			<h2>Change password</h2>
			{{if .PasswordSaved}}<p class="success-message">Password changed successfully.</p>{{end}}
			{{if .PasswordError}}<p class="error-message">{{.PasswordError}}</p>{{end}}

			<form method="post" action="/profile/password">
				<label>
					Current password
					<input type="password" name="current_password" required>
				</label>
				<label>
					New password
					<input type="password" name="new_password" required minlength="8">
				</label>
				<label>
					Confirm new password
					<input type="password" name="new_password2" required minlength="8">
				</label>
				<button type="submit" class="btn btn-primary btn-block">Change password</button>
			</form>
		</div>
	</main>
</body>
</html>
